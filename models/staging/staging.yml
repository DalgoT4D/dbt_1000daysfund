version: 2

models:
  - name: 09a_stg
    description: Combined staging model for the pre-training and post-training sheets in `raw_sheets.09a_pre` and `raw_sheets.09a_post`, with `pre_post` indicating the survey stage.
    columns:
      - name: pre_post
        description: Survey stage indicator. `pre` comes from `raw_sheets.09a_pre` and `post` comes from `raw_sheets.09a_post`.
        tests:
          - not_null
          - accepted_values:
              values: ['pre', 'post']
      - name: nik
        description: Indonesian national identity number (NIK) captured in the raw sheet.
      - name: nama
        description: Respondent name captured in the raw sheet.
      - name: usia
        description: Respondent age parsed as a numeric value from the raw sheet.
      - name: peran
        description: Respondent role captured in the raw sheet.
      - name: score
        description: Achieved pre-test or post-test score parsed as a numeric value from the raw `Score` field in `x / y` format.
      - name: max_score
        description: Maximum possible score parsed as a numeric value from the raw `Score` field in `x / y` format.
      - name: jenis_kelamin
        description: Gender captured in the raw sheet.
      - name: pendidikan_terakhir
        description: Highest completed education level captured in the raw sheet.
      - name: nomor_hp_wa
        description: WhatsApp phone number captured in the raw sheet.
      - name: provinsi
        description: Province captured in the raw sheet.
      - name: kabupaten
        description: Regency or city captured in the raw sheet.
      - name: kecamatan
        description: District captured in the raw sheet.
      - name: desa
        description: Village captured in the raw sheet.
      - name: puskesmas_pengampu
        description: Supervising puskesmas captured in the raw sheet.
      - name: nama_posyandu_binaan
        description: Name of the assisted or supervised posyandu captured in the raw sheet.
      - name: submission_timestamp
        description: Timestamp recorded in the raw sheet as text.
      - name: q1_sasaran_dampingan_ibu_hamil
        description: "Question 1: Which pregnant women are targeted for the case management support program?"
      - name: q2_alasan_pemantauan_tekanan_darah_ibu_hamil
        description: "Question 2: Why should a pregnant woman's blood pressure be monitored?"
      - name: q3_penyebab_hipertensi_saat_hamil
        description: "Question 3: What can cause hypertension to increase during pregnancy?"
      - name: q4_bukan_saran_pencegahan_hipertensi
        description: "Question 4: Which option is not recommended to help a mother avoid hypertension?"
      - name: q5_tindakan_tekanan_sistolik_tinggi
        description: "Question 5: Response captured for a pregnant participant with high systolic blood pressure."
      - name: q6_tindakan_tekanan_darah_atas_140
        description: "Question 6: Response captured for a pregnant participant with blood pressure above 140."
      - name: q7_tindakan_tekanan_darah_atas_120
        description: "Question 7: Response captured for a pregnant participant with blood pressure above 120."
      - name: q8_kriteria_risiko_darah_tinggi
        description: "Question 8: When is a pregnant woman considered at risk of high blood pressure?"
      - name: q9_risiko_ibu_hamil_kek
        description: "Question 9: What risks can occur when a pregnant woman experiences chronic energy deficiency (KEK)?"
      - name: q10_cara_memantau_tekanan_darah
        description: "Question 10: How do you monitor blood pressure?"
      - name: q11_menjaga_tekanan_darah_ibu
        description: "Question 11: What should be done to keep a pregnant woman's blood pressure healthy?"
      - name: q12_bukan_manfaat_ttd
        description: "Question 12: Which option is not a benefit of iron supplement tablets (TTD)?"
      - name: q13_bukan_saran_untuk_ibu_kek
        description: "Question 13: Which option is not recommended advice for a pregnant woman with chronic energy deficiency (KEK)?"
      - name: q14_manfaat_kalsium
        description: "Question 14: What are the benefits of calcium-rich foods or calcium supplements?"
      - name: q15_penyuluhan_untuk_ibu_hipertensi
        description: "Question 15: Which information or counseling can be given to a pregnant woman with hypertension?"
      - name: q16_monitoring_ibu_hamil_hipertensi
        description: "Question 16: What monitoring is needed for pregnant women targeted for hypertension support?"
      - name: q17_sasaran_dampingan_baduta
        description: "Question 17: Which children under two are targeted for the support program?"
      - name: q18_alasan_memantau_perlambatan_berat_badan
        description: "Question 18: Why must slowed weight gain be monitored?"
      - name: q19_sasaran_dampingan_perlambatan_pertumbuhan
        description: "Question 19: In the case management program, who should receive support for growth slowing?"
      - name: q20_penyuluhan_saat_kenaikan_bb_tidak_sesuai_kbm
        description: "Question 20: If a child's weight gain is not aligned with KBM, what counseling should be given?"
      - name: q21_penyuluhan_utama_saat_kenaikan_bb_tidak_sesuai_kbm
        description: "Question 21: If weight gain is not aligned with KBM, what is the main counseling topic?"
      - name: q22_status_pertumbuhan_tidak_naik
        description: "Question 22: Which growth status corresponds to weight that does not increase?"
      - name: q23_bukan_penyebab_perlambatan_pertumbuhan
        description: "Question 23: Which option is not a cause of growth slowing?"
      - name: q24_pertambahan_panjang_badan_tahun_pertama
        description: "Question 24: What length gain is expected during the first year after birth?"
      - name: q25_cara_memantau_pertumbuhan_balita
        description: "Question 25: How can toddler growth be monitored?"
      - name: q26_monitoring_baduta_perlambatan_pertumbuhan
        description: "Question 26: What monitoring is needed for children under two with growth slowing?"
      - name: training_strengths
        description: Post-training feedback on what went well in the training session. Null for `pre` rows.
      - name: training_satisfaction
        description: Post-training satisfaction feedback for the training session. Null for `pre` rows.
      - name: training_improvements
        description: Post-training feedback on improvements needed for future sessions. Null for `pre` rows.
      - name: confidence_to_apply_knowledge_or_skills
        description: Post-training self-reported confidence to apply the knowledge or skills from the training. Null for `pre` rows.
