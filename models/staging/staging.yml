version: 3


models:
  - name: asesmen_kunjungan_rumah_kasus
    description: Flattened Kobo home-visit case assessments enriched with location reference labels.
    columns:
      - name: submission_id
        tests: [not_null, unique]

  - name: training_14_forms
    description: >
      Canonical union of cohort 14 Forms and Sheets submissions, aligned with
      the common cohort 12 and 13 participant and assessment columns.
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: response_source
        tests:
          - not_null
          - accepted_values:
              values: ['forms', 'sheets']
      - name: form_tag
        tests:
          - not_null
          - accepted_values:
              values: ['pre', 'post']

  - name: training_14_forms_stg
    description: Cleaned union of cohort 14 pre- and post-test Google Forms responses.
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: form_tag
        tests:
          - accepted_values:
              values: ['pre', 'post']

  - name: training_14_sheets_stg
    description: >
      Cleaned cohort 14 pre/post Sheets responses, scored against the supplied
      21-question answer key.
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: form_tag
        tests:
          - accepted_values:
              values: ['pre', 'post']
      - name: score
        description: Percentage of all 21 questions answered correctly.
      - name: correct_answer_count
        description: Number of answers matching the supplied answer key.
      - name: answered_question_count
        description: Number of nonblank answers among Q1 through Q21.

  - name: training_13_forms
    description: >
      Canonical union of the cohort 13 Forms and Sheets submissions. It keeps
      the common participant, test, score, location, and training-date columns
      aligned with `training_12_forms_stg`; source-specific audit fields remain
      available in the two upstream staging models.
    columns:
      - name: record_id
        description: Source-qualified row identifier, unique across Forms and Sheets.
        tests:
          - not_null
          - unique
      - name: response_source
        description: Input dataset containing the response (`forms` or `sheets`).
        tests:
          - not_null
          - accepted_values:
              values: ['forms', 'sheets']
      - name: form_tag
        description: Test side containing the response (`pre` or `post`).
        tests:
          - not_null
          - accepted_values:
              values: ['pre', 'post']
      - name: score
        description: Normalized test percentage supplied by Forms or calculated from Sheets answers.

  - name: training_13_forms_stg
    description: >
      Cleaned union of the cohort 13 pre- and post-test form outputs, limited
      to the agreed participant, location, score, and training metadata fields.
    columns:
      - name: record_id
        description: Form-qualified source row identifier.
        tests:
          - not_null
          - unique
      - name: form_tag
        description: Source form containing the response (`pre` or `post`).
        tests:
          - accepted_values:
              values: ['pre', 'post']
      - name: score
        description: Form score normalized to an integer percentage.

  - name: training_13_sheets_stg
    description: >
      Staging table for cohort 13 that unions the raw pre- and post-test
      sheets, standardizes participant fields, unifies matching name variants,
      and calculates score from the 19 question responses.
    columns:
      - name: record_id
        description: Form-qualified source row identifier.
        tests:
          - not_null
          - unique
      - name: form_tag
        description: Source form containing the response (`pre` or `post`).
        tests:
          - accepted_values:
              values: ['pre', 'post']
      - name: score
        description: Percentage of the 19 questions answered correctly, from 0 to 100.
      - name: correct_answer_count
        description: Number of responses matching the supplied answer key.
      - name: answered_question_count
        description: Number of nonblank question responses.
      - name: score_raw
        description: Original `Skor` value retained for auditing; not used to calculate `score`.

  - name: register_posyandu_bumil_stg
    description: Staging model for pregnant-mother Posyandu registration data.
    columns:
      - name: ibu_usia
        description: Mother's age in completed years.
        tests:
          # Null remains allowed when age was not submitted; populated ages must
          # be positive and strictly below the program's 40-year threshold.
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 40
              strictly: true

  - name: training_12_forms_stg
    description: >
      Staging table for cohort 12 that unions the raw `training_12_pre` and
      `training_12_post` sheets into a single row-per-submission dataset. Each
      row keeps its `pre` or `post` tag, normalizes the key profile fields, and
      assigns a `unified_name` across both sheets before any deduplication.
    columns:
      - name: form_tag
        description: >
          Source form tag for the submission: `pre` or `post`.
      - name: nama_raw
        description: >
          Raw submitted participant name from the source sheet.
      - name: unified_name
        description: >
          Canonicalized participant name after cross-sheet name grouping.
      - name: unified_name_key
        description: >
          Normalized join key derived from `unified_name`.
      - name: score
        description: >
          Submission score normalized to an integer percentage when possible.
      - name: phone_key
        description: >
          Digits-only WhatsApp key, normalized to a leading `0` form.
      - name: nik_key
        description: >
          Digits-only NIK key when at least 10 digits were present.
      - name: peran_category
        description: >
          Broad role bucket derived from the raw `Peran` response.

  - name: asesmen_monitoring_posyandu
    description: Flattened staging model for the Monitoring Posyandu Kobo submission data from `raw_kobo.ACTIVEMonitoring_Posyandu`.
    columns:
      - name: submission_id
        description: Kobo submission identifier from `_id`.
        tests:
          - not_null
          - unique
      - name: submission_start_at
        description: Timestamp when the form session started.
        tests:
          - not_null
      - name: submission_end_at
        description: Timestamp when the form session ended.
        tests:
          - not_null
      - name: submission_time
        description: Timestamp when the submission was received by Kobo.
        tests:
          - not_null
      - name: submission_uuid
        description: Kobo submission UUID from `_uuid`.
        tests:
          - not_null
          - unique
      - name: submission_status
        description: Submission status from Kobo, such as `submitted_via_web`.
      - name: submission_version
        description: Kobo form version identifier from `__version__`.
      - name: submitted_by
        description: User who submitted the form, when Kobo captured it.
      - name: xform_id_string
        description: Kobo xForm identifier string.
      - name: formhub_uuid
        description: Formhub UUID stored in the raw submission payload.
      - name: meta_root_uuid
        description: Root UUID from the Kobo metadata block.
      - name: meta_instance_id
        description: Instance identifier from the Kobo metadata block.
      - name: meta_deprecated_id
        description: Deprecated instance identifier from the Kobo metadata block.
      - name: validation_status
        description: Validation status object returned by Kobo.
      - name: tags
        description: Array of Kobo submission tags.
      - name: notes
        description: Array of Kobo submission notes.
      - name: attachments
        description: Array of attachment metadata for the submission.
      - name: geolocation
        description: Raw geolocation array from Kobo.
      - name: geolocation_latitude
        description: Latitude parsed from the first geolocation array position.
      - name: geolocation_longitude
        description: Longitude parsed from the second geolocation array position.
      - name: pembukaan_posyandu
        description: Posyandu code captured in the pembukaan section.
      - name: pembukaan_provinsi_kode
        description: Province code captured in the pembukaan section.
      - name: pembukaan_provinsi
        description: Province label joined from the active Kobo province reference list.
      - name: pembukaan_kota_kabupaten_kode
        description: City or regency code captured in the pembukaan section.
      - name: pembukaan_kota_kabupaten
        description: City or regency label joined from the active Kobo kabupaten reference list.
      - name: pembukaan_kecamatan_kode
        description: District code captured in the pembukaan section.
      - name: pembukaan_kecamatan
        description: District label joined from the active Kobo kecamatan reference list.
      - name: pembukaan_desa_kelurahan_kode
        description: Village or ward code captured in the pembukaan section.
      - name: pembukaan_desa_kelurahan
        description: Village or ward label joined from the active Kobo desa reference list.
      - name: pembukaan_puskesmas_kode
        description: Puskesmas code captured in the pembukaan section.
      - name: pembukaan_puskesmas
        description: Puskesmas label joined from the active Kobo puskesmas reference list.
      - name: pembukaan_enumerator_peran
        description: Enumerator role recorded in the pembukaan section.
      - name: pembukaan_enumerator_nama_lain
        description: Free-text enumerator name recorded in the pembukaan section.
      - name: pembukaan_kunjungan_tanggal
        description: Visit date recorded in the pembukaan section.
        tests:
          - not_null
      - name: langkah_1_1_kader_menyediakan_kartu_nomor_antrian
        description: Response captured for langkah posyandu 1.1.
      - name: langkah_1_2_kader_mendata_sasaran_lembar_registrasi
        description: Response captured for langkah posyandu 1.2.
      - name: langkah_2_1_kader_mempersiapkan_alat_ukur_tinggi_badan
        description: Response captured for langkah posyandu 2.1.
      - name: langkah_2_2_kader_pengukuran_tinggi_badan_berat_badan
        description: Response captured for langkah posyandu 2.2.
      - name: langkah_3_1_kader_penitikan_plotting_buku_kia
        description: Response captured for langkah posyandu 3.1.
      - name: langkah_3_2_pengisian_grafik_kms_buku_kia
        description: Response captured for langkah posyandu 3.2.
      - name: langkah_3_3_pengisian_grafik_pb_tb_u_buku_kia
        description: Response captured for langkah posyandu 3.3.
      - name: langkah_4_1_nakes_kader_bekerja_sama_melayani_sasaran
        description: Response captured for langkah posyandu 4.1.
      - name: langkah_5_1_kader_menyampaikan_penyuluhan_kepada_sasaran
        description: Response captured for langkah posyandu 5.1.
      - name: langkah_5_2_kader_menyampaikan_poin_penyuluhan_sesuai_sasaran
        description: Response captured for langkah posyandu 5.2.
      - name: langkah_5_3_kader_percaya_diri_memberikan_penyuluhan
        description: Response captured for langkah posyandu 5.3.
      - name: langkah_evaluasi_dilakukan_akhir_posyandu
        description: Overall evaluation captured in langkah posyandu.
      - name: penutup_catatan
        description: Free-text closing note captured in the penutup section.
      - name: raw_record
        description: Original JSON submission payload retained for traceability.
